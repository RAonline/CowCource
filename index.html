<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Cow Cource — Polished Version</title>

<style>
    :root{
        --bg:#0f172a;
        --panel:#0b1220;
        --glass: rgba(255,255,255,0.04);
        --muted:#9aa4b2;
        --accent:#7ee3d6;
        --accent-2:#6ee7b7;
        --card:#0b1226;
        --glass-2: rgba(255,255,255,0.03);
        --success:#16a34a;
        --danger:#ef4444;
        --glass-border: rgba(255,255,255,0.06);
    }

    *{box-sizing:border-box}
    body{
        margin:0;
        font-family:Inter,system-ui,Segoe UI,Roboto;
        background:
            radial-gradient(1200px 600px at 10% 10%, rgba(126,227,214,0.06), transparent 8%),
            radial-gradient(900px 500px at 90% 90%, rgba(110,231,183,0.04), transparent 8%),
            var(--bg);
        color:#e6eef6;
        padding:28px;
    }

    .app{
        max-width:980px;
        margin:0 auto;
    }

    .brand{
        display:flex;
        gap:14px;
        align-items:center;
        margin-bottom:20px;
    }
    .logo{
        width:56px;height:56px;border-radius:12px;
        display:flex;align-items:center;justify-content:center;
        font-size:28px;background:linear-gradient(135deg,var(--accent),var(--accent-2));
        color:#042027;font-weight:800;
    }
    .title{font-size:22px;font-weight:700}
    .subtitle{font-size:13px;color:var(--muted)}

    .tabs{
        display:flex;gap:10px;margin-bottom:20px;
    }
    .tab{
        padding:10px 14px;border-radius:10px;
        background:var(--glass);border:1px solid var(--glass-border);
        cursor:pointer;color:var(--muted);transition:all .18s ease;
    }
    .tab.active{
        background:linear-gradient(90deg, rgba(126,227,214,0.06), rgba(110,231,183,0.03));
        color:var(--accent);
        transform:translateY(-2px);
        box-shadow:0 6px 18px rgba(2,6,23,0.45);
    }

    .dev-banner{
        background:#0b2a2a;padding:10px;border-radius:10px;
        margin-bottom:12px;color:var(--accent-2);font-weight:700;
        animation:pulse 2.6s infinite;
    }
    @keyframes pulse{
        0%{transform:translateY(0)}
        50%{transform:translateY(-3px)}
        100%{transform:translateY(0)}
    }

    .dev-actions{
        display:flex;gap:10px;flex-wrap:wrap;margin-bottom:20px;
    }
    .btn{
        padding:10px 14px;border-radius:10px;
        background:linear-gradient(90deg,var(--accent),var(--accent-2));
        color:#042027;font-weight:700;border:none;cursor:pointer;
        box-shadow:0 8px 30px rgba(14,30,37,0.45);
    }

    .grid{
        display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;
    }
    .card{
        background:var(--glass-2);border:1px solid var(--glass-border);
        padding:16px;border-radius:12px;backdrop-filter:blur(6px);
        transform:translateY(8px);opacity:0;animation:enter .42s forwards;
    }
    @keyframes enter{to{transform:none;opacity:1}}

    .card h3{margin:0 0 8px 0}
    .card p{margin:0;color:var(--muted);font-size:14px}

    .dev-fab{
        position:fixed;right:26px;bottom:26px;width:64px;height:64px;
        border-radius:16px;background:var(--panel);border:1px solid var(--glass-border);
        color:var(--accent);font-weight:800;font-size:14px;cursor:pointer;
        box-shadow:0 18px 50px rgba(2,6,23,0.6);
    }

    .modal-backdrop{
        position:fixed;inset:0;background:rgba(2,6,23,0.6);
        display:none;align-items:center;justify-content:center;
    }
    .modal{
        width:360px;background:var(--panel);padding:20px;border-radius:12px;
        border:1px solid var(--glass-border);
        box-shadow:0 30px 80px rgba(2,6,23,0.7);
    }
    input,textarea{
        width:100%;padding:10px;border-radius:10px;
        border:1px solid rgba(255,255,255,0.04);background:transparent;color:inherit;
    }
    textarea{min-height:110px}

    /* DEV LOGIN MODAL */
    #loginBackdrop{
        position:fixed;inset:0;background:rgba(0,0,0,0.6);
        display:none;align-items:center;justify-content:center;
    }
    #loginBox{
        background:var(--panel);padding:20px;border-radius:12px;
        border:1px solid var(--glass-border);width:300px;
        box-shadow:0 20px 60px rgba(0,0,0,0.5);
    }
</style>
</head>
<body>

<div class="app">
    <div class="brand">
        <div class="logo">🐄</div>
        <div>
            <div class="title">Cow Cource</div>
            <div class="subtitle">Encyclopedia • Dictionary • Archive • Newsletter</div>
        </div>
    </div>

    <div class="tabs">
        <div class="tab active" onclick="switchTab('Encyclopedia')">Encyclopedia</div>
        <div class="tab" onclick="switchTab('Dictionary')">Dictionary</div>
        <div class="tab" onclick="switchTab('Archive')">Archive</div>
        <div class="tab" onclick="switchTab('Newsletter')">Newsletter</div>
    </div>

    <div id="devBanner" class="dev-banner" style="display:none">DEV MODE ACTIVE — OperatorMILK</div>

    <div id="devActions" class="dev-actions" style="display:none">
        <button class="btn" onclick="openModal('Encyclopedia')">+ Add Encyclopedia</button>
        <button class="btn" onclick="openModal('Dictionary')">+ Add Dictionary</button>
        <button class="btn" onclick="openModal('Archive')">+ Add Archive</button>
        <button class="btn" onclick="openModal('Newsletter')">+ Add Newsletter</button>
    </div>

    <div id="contentArea">
        <div id="emptyState" style="opacity:0.6;text-align:center;margin-top:20px">
            No entries yet. Use the DEV console to add the first article.
        </div>
        <div id="grid" class="grid" style="display:none"></div>
    </div>
</div>

<button class="dev-fab" onclick="openLogin()">DEV</button>

<!-- DEV LOGIN MODAL -->
<div id="loginBackdrop">
    <div id="loginBox">
        <h3>Developer Login</h3>
        <input id="devInput" type="password" placeholder="Enter DEV code">
        <button class="btn" style="margin-top:10px" onclick="confirmLogin()">Unlock</button>
        <button class="btn" style="margin-top:10px;background:#6b7280" onclick="closeLogin()">Cancel</button>
    </div>
</div>

<!-- ADD ENTRY MODAL -->
<div id="modalBackdrop" class="modal-backdrop">
    <div class="modal">
        <h3 id="modalTitle">Add Entry</h3>
        <input id="titleInput" placeholder="Title">
        <input id="typeInput" placeholder="Type (optional)">
        <textarea id="summaryInput" placeholder="Short summary"></textarea>
        <textarea id="contentInput" placeholder="Full content"></textarea>
        <button class="btn" onclick="createEntry()">Create</button>
        <button class="btn" style="background:#6b7280" onclick="closeModal()">Cancel</button>
    </div>
</div>

<script>
let currentTab = "Encyclopedia";
let devMode = false;
let modalSection = "";

let entries = JSON.parse(localStorage.getItem("cowcource_v1") || "{}");
if (!entries.Encyclopedia) entries = {Encyclopedia:[],Dictionary:[],Archive:[],Newsletter:[]};

function save(){ localStorage.setItem("cowcource_v1", JSON.stringify(entries)); }

function switchTab(tab){
    currentTab = tab;
    document.querySelectorAll(".tab").forEach(t => t.classList.remove("active"));
    [...document.querySelectorAll(".tab")].find(t => t.innerText === tab).classList.add("active");
    render();
}

function openLogin(){
    document.getElementById("loginBackdrop").style.display = "flex";
}
function closeLogin(){
    document.getElementById("loginBackdrop").style.display = "none";
}
function confirmLogin(){
    let code = document.getElementById("devInput").value;
    if (code === "OperatorMILK"){
        devMode = true;
        document.getElementById("devBanner").style.display = "block";
        document.getElementById("devActions").style.display = "flex";
        closeLogin();
    } else alert("Incorrect code");
}

function openModal(section){
    modalSection = section;
    document.getElementById("modalTitle").innerText = "Add to " + section;
    document.getElementById("modalBackdrop").style.display = "flex";
}

function closeModal(){
    document.getElementById("modalBackdrop").style.display = "none";
}

function createEntry(){
    let title = titleInput.value.trim();
    let type = typeInput.value.trim();
    let summary = summaryInput.value.trim();
    let content = contentInput.value.trim();

    if (!title || !summary || !content) return alert("Fill all fields");

    entries[modalSection].unshift({
        id: Date.now(),
        title, type, summary, content,
        created: new Date().toLocaleString()
    });

    save();
    closeModal();
    render();
}

function render(){
    let list = entries[currentTab];
    let grid = document.getElementById("grid");
    let empty = document.getElementById("emptyState");

    if (list.length === 0){
        grid.style.display = "none";
        empty.style.display = "block";
        return;
    }

    empty.style.display = "none";
    grid.innerHTML = "";
    grid.style.display = "grid";

    list.forEach((a,i)=>{
        let div = document.createElement("div");
        div.className = "card";
        div.style.animationDelay = (i*40)+"ms";
        div.innerHTML = `
            <h3>${a.title}</h3>
            <p>${a.summary}</p>
            <details><summary>Read more</summary><p>${a.content}</p></details>
            <small style="color:var(--muted)">${a.created}</small>
        `;
        grid.appendChild(div);
    });
}

render();
</script>

</body>
</html>
